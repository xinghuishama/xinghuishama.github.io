<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<!-- 缓存策略调整：移除 no-cache，改为使用版本号刷新资源 -->
<meta http-equiv="Cache-Control" content="max-age=3600">
<meta name="description" content="神码再现 · 澳彩杀码助手，支持频次分析、实时开奖、历史查询">
<title>神码再现 v3.6.3 · 生肖、五行属性自动跨年永不过期版</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Tailwind CSS 原子框架 (CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- 自定义样式 -->
<link rel="stylesheet" href="style.css?v=3.6.3">
</head>
<body class="mech-grid text-gray-300 overflow-x-hidden">
  <!-- 彩色粒子背景层 (z-index:0) -->
  <canvas id="particle-canvas"></canvas>

  <main class="relative z-10 max-w-4xl mx-auto p-3">
    <header class="relative overflow-hidden rounded-t-xl bg-gradient-to-r from-[#00ffea]/20 via-[#9d00ff]/20 to-[#ff0055]/20 border-b border-[#00ffea]/30 p-6 text-center">
      <h1 class="relative z-10 text-3xl font-black bg-gradient-to-r from-[#00ffea] via-[#ff0055] to-[#9d00ff] bg-clip-text text-transparent tracking-wider">神码再现</h1>
      <p class="relative z-10 text-sm text-gray-400 mt-2 tracking-widest">命中衰减 · 频次动态调整</p>
    </header>

    <section class="border-x border-b border-[#00ffea]/20 p-4 rounded-b-xl">
      <textarea id="numbers" rows="3" maxlength="15000" class="w-full bg-transparent border border-[#00ffea]/30 rounded-lg p-3 text-[#00ffea] font-mono text-sm resize-y min-h-[100px] focus:outline-none focus:border-[#00ffea] transition-all" placeholder="输入号码或生肖，例如: 12 25 36 龙蛇马 8 17 29 41"></textarea>
      <div class="flex justify-between items-center mt-2 text-xs text-gray-500 font-mono">
        <span>智能分析引擎 <span class="text-emerald-400 text-[10px]">(防抖200ms · 上限5000个号码)</span></span>
        <div class="flex gap-3">
          <span>有效: <span id="charCount" class="text-[#00ffea] font-bold">0</span></span>
          <span id="numberWarn" class="text-red-400 hidden">⚠️ 已截断至5000个</span>
        </div>
      </div>
      <div class="flex gap-2 mt-4">
        <button id="exampleBtn" class="flex-1 bg-transparent border border-[#00ffea]/50 text-[#00ffea] py-2 px-4 rounded-lg text-sm font-semibold hover:bg-[#00ffea]/10 transition-all active:scale-95 flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M13 3H3v2h10V3zm0 4H3v2h10V7zm0 4H3v2h10v-2z"/></svg>示例
        </button>
        <button id="clearBtn" class="flex-1 bg-transparent border border-[#ff0055]/50 text-[#ff0055] py-2 px-4 rounded-lg text-sm font-semibold hover:bg-[#ff0055]/10 transition-all active:scale-95 flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm3 10.5L10.5 12 8 9.5 5.5 12 5 10.5 7.5 8 5 5.5 5.5 4 8 6.5 10.5 4l.5 1.5L8.5 8z"/></svg>清除输入
        </button>
      </div>
    </section>

    <section class="mt-4 border border-[#00ffea]/20 rounded-xl p-4">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-bold bg-gradient-to-r from-[#00ffea] to-[#ff0055] bg-clip-text text-transparent">分析结果</h2>
        <button id="copyResultBtn" class="bg-gradient-to-r from-[#00ff88]/80 to-emerald-600/80 text-black py-2 px-4 rounded-lg text-sm font-bold hover:shadow-[0_0_20px_rgba(0,255,136,0.6)] transition-all active:scale-95 flex items-center gap-2">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 16 16"><path d="M4 2v12h8v2H2V2h2zm10 0v12h2V2h-2zm-2 0H6v12h6V2z"/></svg>复制
        </button>
      </div>
      <div id="result" class="min-h-[200px]">
        <div class="flex flex-col items-center justify-center py-12 text-gray-500">
          <svg class="w-20 h-20 mb-4 opacity-50" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" stroke="#00ffea" stroke-width="2" fill="none" stroke-dasharray="5,5"/><path d="M30 50l15 15 25-30" stroke="#00ffea" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
          <p>输入号码启动分析</p>
        </div>
      </div>
    </section>

    <section class="mt-4 lottery-card border border-[#00ffea]/20 rounded-xl">
      <div class="flex justify-between items-start mb-4">
        <div><div class="text-gray-400 text-sm mb-1">第 <span id="lotteryPeriod" class="text-gray-300">--</span> 期</div></div>
        <div class="text-right">
          <div class="text-gray-400 text-sm mb-1">開獎時間</div>
          <div id="lotteryTime" class="text-gray-300 text-sm">--</div>
          <div id="lastRefreshTime" class="text-xs text-gray-500 mt-1"></div>
        </div>
      </div>
      <div class="border-t border-gray-700/50 my-4"></div>
      <div id="lotteryBalls" class="flex justify-center flex-wrap gap-1"></div>
      <button id="refreshLotteryBtn" class="refresh-btn-orange">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>刷新数据
      </button>
    </section>

    <footer class="mt-6 text-center text-xs text-gray-600 tracking-widest pb-4">杀码助手仅供港澳居民使用</footer>
  </main>

  <!-- 底部功能导航栏（已移除“直播”按钮） -->
  <nav class="bottom-nav">
    <div class="flex gap-1 overflow-x-auto hide-scrollbar">
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="shama">杀码</button>
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="shengxiao">生肖</button>
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="haomatou">头数</button>
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="weishu">尾数</button>
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="shuduan">数段</button>
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="bose">波色</button>
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="wuxing">五行</button>
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="bandanshuang">半单双</button>
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="heshu">合数</button>
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#1a1a2a] rounded-lg text-xs text-gray-400 border border-[#00ffea]/20 transition-all" data-drawer="history">历史</button>
      <!-- 清空按钮保留并保持原有样式 -->
      <button class="nav-item flex-shrink-0 px-3 py-2 bg-[#ff0055]/20 rounded-lg text-xs text-[#ff0055] border border-[#ff0055]/30 transition-all" data-drawer="selectnone">清空</button>
    </div>
  </nav>

  <!-- 抽屉遮罩层 -->
  <div id="drawer-overlay" class="fixed inset-0 bg-black/30 z-40 hidden opacity-0 transition-opacity duration-300"></div>
  <!-- 抽屉容器 -->
  <div id="drawer-container" class="fixed inset-x-0 bottom-0 z-50 drawer-mobile bg-[#0a0a12] border-t-2 border-[#00ffea] rounded-t-2xl max-h-[90vh] overflow-y-auto shadow-[0_-10px_40px_rgba(0,0,0,0.8)]">
    <div class="sticky top-0 bg-[#0a0a12] border-b border-[#00ffea]/30 p-2 flex justify-between items-center z-10">
      <h3 id="drawer-title" class="text-[#00ffea] font-bold text-lg">筛选器</h3>
      <button id="drawer-close" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-[#00ffea]/20 text-[#00ffea] transition-all">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="drawer-content" class="p-4 space-y-4 pb-20 bg-[#0a0a12]"></div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-[#0a0a12] border border-[#00ffea]/30 text-[#00ffea] px-6 py-3 rounded-lg shadow-[0_0_20px_rgba(0,255,234,0.3)] transform translate-y-20 opacity-0 transition-all duration-300 z-[200] pointer-events-none"></div>

  <!-- 业务脚本 (顺序不能变) -->
  <script src="data.js?v=3.6.3"></script>
  <script src="worker.js?v=3.6.3"></script>
  <script src="app.js?v=3.6.3"></script>
</body>
</html>
